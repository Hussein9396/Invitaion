<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Special Surprise</title>
    <style>
        :root {
            --bg: #fff0f3;
            --heart-color: #ff4d6d;
            --gold: #c6a664;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: manipulation;
        }
        #game-container {
            text-align: center;
            z-index: 10;
        }
        .heart {
            position: absolute;
            font-size: 40px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
            animation: float 4s linear infinite;
        }
        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-20vh) rotate(360deg); }
        }
        .counter {
            font-size: 1.2rem;
            color: var(--heart-color);
            font-weight: bold;
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* Updated Win Window */
        #invite-card {
            display: none;
            background: white;
            padding: 40px 20px;
            border-radius: 0px; /* Square edges for a "wide" feel */
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            width: 100%; /* Spans the width of the window */
            text-align: center;
            border-top: 5px solid var(--heart-color);
            border-bottom: 5px solid var(--heart-color);
            animation: popIn 0.5s ease-out;
            z-index: 100;
        }
        
        @keyframes popIn {
            0% { transform: translateY(50px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        h1 { 
            color: var(--heart-color); 
            margin: 0; 
            font-size: 3.5rem; /* Large headline */
            width: 100%;
            text-transform: uppercase;
        }

        .details { 
            font-size: 1.2rem; 
            color: #444; 
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="counter" id="score-board">Catch 10 Hearts to Win: <span id="count">0</span>/10</div>
    </div>

    <div id="invite-card">
        <h1>🏆 YOU WON 🏆</h1>
        <div class="details">
            <p>Congratulations! Now you are officially the best penguin ever 🏅</p>
        </div>
    </div>

    <script>
        let count = 0;
        const target = 10;
        const container = document.body;

        function createHeart() {
            if (count >= target) return;

            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 80 + 10 + 'vw';
            
            const duration = Math.random() * 3 + 2;
            heart.style.animationDuration = duration + 's';
            
            heart.onclick = () => {
                count++;
                document.getElementById('count').innerText = count;
                heart.style.transform = 'scale(0)';
                setTimeout(() => heart.remove(), 100);
                
                if (count === target) {
                    showInvitation();
                }
            };

            container.appendChild(heart);
            
            setTimeout(() => {
                if (heart.parentElement) heart.remove();
            }, duration * 1000);
        }

        function showInvitation() {
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('invite-card').style.display = 'block';
            clearInterval(gameInterval);
        }

        const gameInterval = setInterval(createHeart, 800);
    </script>
</body>
</html>
